name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: |
          rm -rf android
          npx cap add android

      - name: Generate Android icons from SVG
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq librsvg2-bin imagemagick
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          for size in mdpi:48 hdpi:72 xhdpi:96 xxhdpi:144 xxxhdpi:192; do
            den=${size%:*}
            px=${size#*:}
            rsvg-convert -w $px -h $px public/favicon.svg -o "android/app/src/main/res/mipmap-$den/ic_launcher.png"
            rsvg-convert -w $px -h $px public/favicon.svg -o "android/app/src/main/res/mipmap-$den/ic_launcher_foreground.png"
            convert -size ${px}x${px} xc:'#FADADD' "android/app/src/main/res/mipmap-$den/ic_launcher_background.png"
          done

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Build release APK
        run: cd android && ./gradlew assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk

