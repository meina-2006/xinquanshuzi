<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>心泉密码图标预览</title></head>
<body style="display:flex;align-items:center;justify-content:center;height:100vh;background:#f5f5f5;margin:0;font-family:sans-serif">
<div style="text-align:center;background:white;padding:40px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.1)">
  <h2 style="color:#444;margin-bottom:20px">心泉密码 - 应用图标</h2>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="256" height="256">
    <defs>
      <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#FDE4EE"/>
        <stop offset="40%" stop-color="#FCE4EC"/>
        <stop offset="100%" stop-color="#F5C8D6"/>
      </linearGradient>
      <linearGradient id="heartGrad" x1="15%" y1="5%" x2="85%" y2="95%">
        <stop offset="0%" stop-color="#FF7BA6"/>
        <stop offset="30%" stop-color="#E8547E"/>
        <stop offset="70%" stop-color="#D9466E"/>
        <stop offset="100%" stop-color="#C43A5E"/>
      </linearGradient>
      <linearGradient id="clayHL" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="rgba(255,255,255,0.45)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
      </linearGradient>
      <radialGradient id="glow" cx="50%" cy="45%" r="50%">
        <stop offset="0%" stop-color="rgba(232,84,126,0.18)"/>
        <stop offset="100%" stop-color="rgba(232,84,126,0)"/>
      </radialGradient>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#B43C5A" flood-opacity="0.35"/>
      </filter>
    </defs>
    <rect width="100" height="100" rx="22" fill="url(#bg)"/>
    <ellipse cx="50" cy="44" rx="42" ry="40" fill="url(#glow)"/>
    <g transform="translate(11,12) scale(0.278)">
      <path d="M140 245 C135 242,110 225,80 200 C45 170,10 140,10 95 C10 60,30 32,55 22 C75 14,100 16,120 28 C128 34,136 42,140 50 C144 42,152 34,160 28 C180 16,205 14,225 22 C250 32,270 60,270 95 C270 140,235 170,200 200 C170 225,145 242,140 245 Z" fill="url(#heartGrad)" filter="url(#shadow)"/>
      <path d="M140 245 C135 242,110 225,80 200 C45 170,10 140,10 95 C10 60,30 32,55 22 C75 14,100 16,120 28 C128 34,136 42,140 50 C144 42,152 34,160 28 C180 16,205 14,225 22 C250 32,270 60,270 95 C270 140,235 170,200 200 C170 225,145 242,140 245 Z" fill="url(#clayHL)" opacity="0.9"/>
    </g>
  </svg>
  <p style="color:#888;margin-top:12px;font-size:14px">Claymorphism 3D 立体心形 · 渐变粉</p>
</div></body></html>
